{% extends 'base.html' %}
{% block content %}
    <!--질문 목록-->
    <div class="container my-3">
        <div class="d-flex justify-content-end mb-3">
        <a href="{{ url_for('question.create') }}" class="btn btn-primary btn-sm">질문 등록하기</a>
        </div>
        <table class="table table-hover">
            <thead>
                <tr class="table-dark">
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성일자</th>
                </tr>
            </thead>

            <tbody>
            {% if question_list %}
            {% for question in question_list %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>
                    <a href="{{ url_for('question.detail', question_id=question.id) }}">{{ question.subject }}</a>
                </td>
                <td>{{ question.create_date }}</td>
            </tr>
            {% endfor %}
            {% else %}
  <!--bootstrap js CDN-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>            <tr>
                <td colspan="3">질문이 없습니다.</td>
            </tr>
            {% endif %}
            </tbody>
        </table>
    </div>
{% endblock %}
